<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Simple on/off daily work time tracker">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏱️</text></svg>">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tracker">
    <meta name="theme-color" content="#f4f5fb" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0d0e14" media="(prefers-color-scheme: dark)">
    <title>Time Tracker</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            color-scheme: light dark;
            --bg: #f4f5fb;
            --bg-grad: radial-gradient(1200px 600px at 50% -10%, #e9ecff 0%, #f4f5fb 60%);
            --card: rgba(255,255,255,0.85);
            --card-solid: #ffffff;
            --ink: #14151a;
            --muted: #71727f;
            --line: #e7e8f0;
            --field: #f3f4fa;
            --on: #16b364;
            --on-soft: rgba(22,179,100,0.14);
            --off: #f0445a;
            --accent: #6366f1;
            --accent-ink: #ffffff;
            --shadow: 0 10px 30px -12px rgba(40,42,80,0.22);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0d0e14;
                --bg-grad: radial-gradient(1200px 600px at 50% -10%, #1b1d31 0%, #0d0e14 60%);
                --card: rgba(26,27,38,0.72);
                --card-solid: #1a1b26;
                --ink: #f1f2f7;
                --muted: #9a9bac;
                --line: #2a2c3c;
                --field: #20212e;
                --on: #2dd47f;
                --on-soft: rgba(45,212,127,0.16);
                --off: #ff5f72;
                --accent: #818cf8;
                --accent-ink: #0d0e14;
                --shadow: 0 14px 40px -14px rgba(0,0,0,0.7);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-grad), var(--bg);
            background-attachment: fixed;
            color: var(--ink);
            line-height: 1.5;
            padding: 32px 16px 64px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 540px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 26px; }
        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .date {
            color: var(--muted);
            font-size: 0.875rem;
            margin-top: 4px;
        }

        .card {
            background: var(--card);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid var(--line);
            border-radius: 22px;
            padding: 26px;
            margin-bottom: 18px;
            box-shadow: var(--shadow);
        }

        .today { text-align: center; }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: var(--muted);
            background: var(--field);
            padding: 6px 12px;
            border-radius: 999px;
            margin-bottom: 18px;
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--muted);
            transition: background 0.2s;
        }
        .dot.on { background: var(--on); animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 var(--on-soft); }
            70% { box-shadow: 0 0 0 9px transparent; }
            100% { box-shadow: 0 0 0 0 transparent; }
        }

        .total {
            font-size: 3.4rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.03em;
            margin: 2px 0 22px;
            line-height: 1;
        }
        .total .u { font-size: 1.4rem; font-weight: 600; color: var(--muted); margin: 0 2px 0 1px; }
        .weekstat {
            font-size: 0.8rem;
            color: var(--muted);
            margin: -12px 0 20px;
        }
        .weekstat b { color: var(--ink); font-weight: 700; font-variant-numeric: tabular-nums; }

        button {
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 650;
            border: none;
            border-radius: 14px;
            padding: 16px 32px;
            cursor: pointer;
            color: #fff;
            transition: transform 0.08s ease, filter 0.2s;
            width: 100%;
        }
        button:hover { filter: brightness(1.05); }
        button:active { transform: scale(0.985); }
        .btn-on { background: linear-gradient(180deg, var(--on), color-mix(in srgb, var(--on) 84%, black)); }
        .btn-off { background: linear-gradient(180deg, var(--off), color-mix(in srgb, var(--off) 84%, black)); }

        .sessions {
            list-style: none;
            margin-top: 18px;
            font-size: 0.875rem;
        }
        .sessions li {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 0;
            border-top: 1px solid var(--line);
        }
        .sessions li:first-child { border-top: none; }
        .sessions .times { flex: 1; text-align: left; color: var(--ink); cursor: pointer; }
        .sessions .times.editable:hover { color: var(--accent); }
        .sessions .dur { font-variant-numeric: tabular-nums; color: var(--muted); font-weight: 600; }
        .sessions .live { color: var(--on); font-weight: 600; }
        .sessions .cap { color: var(--off); font-size: 0.78rem; margin-left: 6px; }

        /* inline edit row */
        .edit-row { display: flex; align-items: center; gap: 6px; flex: 1; }
        .edit-row input[type="time"] {
            font-family: inherit; font-size: 0.85rem; padding: 6px 7px;
            border: 1px solid var(--line); border-radius: 8px;
            color: var(--ink); background: var(--field); flex: 1 1 0; min-width: 0;
        }
        .edit-row input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
        .icon-btn {
            width: 30px; height: 30px; border-radius: 8px; border: none;
            font-size: 0.9rem; line-height: 1; padding: 0; cursor: pointer; flex: 0 0 auto;
        }
        .icon-btn.ok { background: var(--accent); color: var(--accent-ink); }
        .icon-btn.cancel { background: var(--field); color: var(--muted); }

        .del {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1;
            width: 26px;
            height: 26px;
            border-radius: 8px;
            padding: 0;
            cursor: pointer;
            opacity: 0.55;
            flex: 0 0 auto;
            transition: background 0.15s, color 0.15s, opacity 0.15s;
        }
        .del:hover { color: var(--off); opacity: 1; background: color-mix(in srgb, var(--off) 14%, transparent); }
        .del:active { transform: none; }

        .add-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px dashed var(--line);
        }
        .time-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .add-row input {
            font-family: inherit;
            font-size: 0.85rem;
            padding: 9px 10px;
            border: 1px solid var(--line);
            border-radius: 10px;
            color: var(--ink);
            background: var(--field);
            min-width: 0;
        }
        .add-row input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
        .add-row input[type="date"] { width: 100%; }
        .add-row input[type="time"] { flex: 1 1 0; }
        .add-row .sep { color: var(--muted); font-size: 0.85rem; flex: 0 0 auto; }
        .btn-add {
            width: auto;
            flex: 0 0 auto;
            font-size: 0.85rem;
            font-weight: 650;
            padding: 9px 16px;
            border-radius: 10px;
            color: var(--accent-ink);
            background: var(--accent);
        }

        h2 {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .history { list-style: none; }
        .hnode { border-top: 1px solid var(--line); }
        .history > .hnode:first-child { border-top: none; }
        .hnode-head {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 0;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .hnode-head .caret {
            color: var(--muted); font-size: 0.7rem; flex: 0 0 auto;
            width: 10px; text-align: center; transition: transform 0.2s;
        }
        .hnode.open > .hnode-head .caret { transform: rotate(90deg); }
        .hnode-head .label { flex: 1; }
        .hnode-head.group .label { font-weight: 600; }
        .hnode-head .hrs { font-weight: 700; font-variant-numeric: tabular-nums; color: var(--ink); }
        .hnode-head.group .hrs { color: var(--muted); }
        .hnode-body { display: none; padding-left: 16px; }
        .hnode.open > .hnode-body { display: block; }
        .hnode-body .sessions { margin-top: 2px; padding-bottom: 8px; }
        .empty { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 14px 0; }

        .footer {
            text-align: center;
            margin-top: 22px;
            font-size: 0.8rem;
            color: var(--muted);
        }
        .footer a { color: var(--accent); text-decoration: none; cursor: pointer; font-weight: 600; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⏱️ Time Tracker</h1>
            <p class="date" id="today-date"></p>
        </header>

        <div class="card today">
            <div class="status">
                <span class="dot" id="dot"></span>
                <span id="status-text">Not working</span>
            </div>
            <div class="total" id="total">0h 00m</div>
            <div class="weekstat" id="weekstat"></div>
            <button id="toggle"></button>
            <ul class="sessions" id="sessions"></ul>
            <div class="add-row">
                <input type="date" id="add-date" aria-label="Date">
                <div class="time-group">
                    <input type="time" id="add-start" aria-label="Start time">
                    <span class="sep">→</span>
                    <input type="time" id="add-end" aria-label="End time">
                    <button class="btn-add" id="add-btn">+ Add</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>History</h2>
            <div class="history" id="history"></div>
        </div>

        <p class="footer">
            Stored locally in your browser · <a id="export">Export CSV</a>
        </p>
    </div>

    <script>
        const STORE_KEY = 'timeTracker';

        // ===== Storage: { "YYYY-MM-DD": [{start: ms, end: ms|null}, ...] } =====
        const load = () => { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; } };
        const save = (data) => localStorage.setItem(STORE_KEY, JSON.stringify(data));

        const pad = (n) => String(n).padStart(2, '0');
        const keyOf = (d) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
        const todayKey = () => keyOf(new Date());

        // end of the calendar day that contains ms
        const endOfDay = (ms) => { const d = new Date(ms); d.setHours(23,59,59,999); return d.getTime(); };
        // effective end for totals: real end, else cap at end of its own day or now (whichever first)
        const effEnd = (s, now) => s.end ?? Math.min(now, endOfDay(s.start));

        // monday-start week containing date d
        const startOfWeek = (d) => { const x = new Date(d); x.setHours(0,0,0,0); x.setDate(x.getDate() - ((x.getDay()+6)%7)); return x.getTime(); };

        // ===== Time helpers =====
        const fmtDuration = (ms) => {
            const totalMin = Math.floor(ms / 60000);
            return `${Math.floor(totalMin / 60)}h ${pad(totalMin % 60)}m`;
        };
        const fmtTotalHTML = (ms) => {
            const totalMin = Math.floor(ms / 60000);
            return `${Math.floor(totalMin / 60)}<span class="u">h</span>${pad(totalMin % 60)}<span class="u">m</span>`;
        };
        const fmtClock = (ms) => new Date(ms).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const toTimeVal = (ms) => { const d = new Date(ms); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; };
        const dayTotal = (sessions, now) =>
            sessions.reduce((sum, s) => sum + (effEnd(s, now) - s.start), 0);
        const isRunning = (sessions) => sessions.length > 0 && sessions[sessions.length - 1].end == null;

        // ===== Elements =====
        const el = {
            date: document.getElementById('today-date'),
            dot: document.getElementById('dot'),
            statusText: document.getElementById('status-text'),
            total: document.getElementById('total'),
            weekstat: document.getElementById('weekstat'),
            toggle: document.getElementById('toggle'),
            sessions: document.getElementById('sessions'),
            history: document.getElementById('history'),
            export: document.getElementById('export'),
            addDate: document.getElementById('add-date'),
            addStart: document.getElementById('add-start'),
            addEnd: document.getElementById('add-end'),
            addBtn: document.getElementById('add-btn'),
        };

        let tick = null;

        function toggle() {
            const data = load();
            const key = todayKey();
            const sessions = data[key] || [];
            if (isRunning(sessions)) {
                sessions[sessions.length - 1].end = Date.now();   // clock out
            } else {
                sessions.push({ start: Date.now(), end: null });  // clock in
            }
            data[key] = sessions;
            save(data);
            render();
        }

        let editing = null;            // "YYYY-MM-DD#index" currently being edited
        const openNodes = new Set();   // expanded history nodes (d:/w:/m: ids)

        // ===== date grouping helpers =====
        const dayMs = (k) => new Date(k + 'T00:00').getTime();
        const monthStart = (d) => { const x = new Date(d); x.setHours(0,0,0,0); x.setDate(1); return x.getTime(); };
        const groupBy = (arr, fn) => arr.reduce((o, x) => { const k = fn(x); (o[k] ||= []).push(x); return o; }, {});
        const dayLabel = (k) => new Date(k + 'T00:00').toLocaleDateString([], { weekday: 'short', day: 'numeric', month: 'short' });
        const monthLabel = (ms) => new Date(ms).toLocaleDateString([], { month: 'long', year: 'numeric' });
        const isoWeek = (date) => {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));   // nearest Thursday
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        };
        function weekLabel(startMs) {
            const s = new Date(startMs), e = new Date(startMs); e.setDate(e.getDate() + 6);
            const dm = (d) => d.toLocaleDateString([], { day: 'numeric', month: 'numeric' });
            return `Week ${isoWeek(s)} — ${dm(s)} - ${dm(e)}`;
        }

        // build a ms timestamp for "HH:MM" on a given "YYYY-MM-DD"
        function timeToDate(dateStr, timeStr) {
            const [y, mo, d] = dateStr.split('-').map(Number);
            const [h, m] = timeStr.split(':').map(Number);
            return new Date(y, mo - 1, d, h, m, 0, 0).getTime();
        }

        // close any clock-in left running on a past day, capping it at end of that day
        function autoCloseStale() {
            const data = load(); const tk = todayKey(); let changed = false;
            for (const k of Object.keys(data)) {
                if (k === tk) continue;
                for (const s of data[k]) {
                    if (s.end == null) { s.end = endOfDay(s.start); s.capped = true; changed = true; }
                }
            }
            if (changed) save(data);
        }

        // insert/replace a session into a day's array, resolving overlaps with completed sessions.
        // returns the new array, or null if the user cancelled.
        function applyWithOverlap(arr, cand, replaceIndex) {
            const now = Date.now();
            const rest = arr.filter((_, i) => i !== replaceIndex);
            const overlaps = rest.filter(s => s.end != null && cand.start < s.end && cand.end > s.start);
            if (!overlaps.length) {
                rest.push(cand);
            } else if (confirm(`Overlaps ${overlaps.length} existing session${overlaps.length>1?'s':''}.\n\nOK = merge into one, Cancel = choose to keep both.`)) {
                const merged = {
                    start: Math.min(cand.start, ...overlaps.map(s => s.start)),
                    end:   Math.max(cand.end,   ...overlaps.map(s => effEnd(s, now))),
                };
                const kept = rest.filter(s => !overlaps.includes(s));
                kept.push(merged);
                kept.sort((a, b) => a.start - b.start);
                return kept;
            } else if (!confirm('Keep both overlapping sessions anyway?')) {
                return null;   // cancelled entirely
            } else {
                rest.push(cand);   // keep both
            }
            rest.sort((a, b) => a.start - b.start);
            return rest;
        }

        function addManual() {
            const dv = el.addDate.value, sv = el.addStart.value, ev = el.addEnd.value;
            if (!dv || !sv || !ev) { alert('Pick a date, start and end time.'); return; }
            const start = timeToDate(dv, sv), end = timeToDate(dv, ev);
            if (end <= start) { alert('End time must be after start time.'); return; }
            const data = load();
            const result = applyWithOverlap(data[dv] || [], { start, end }, null);
            if (!result) return;
            if (result.length) data[dv] = result; else delete data[dv];
            save(data);
            el.addStart.value = ''; el.addEnd.value = ''; el.addDate.value = todayKey();
            render();
        }

        function beginEdit(id) {
            editing = id;
            if (tick) { clearInterval(tick); tick = null; }
            render();
        }

        function commitEdit(btn) {
            const id = btn.dataset.save;
            const li = btn.closest('li');
            const sv = li.querySelector('.e-start').value, ev = li.querySelector('.e-end').value;
            if (!sv || !ev) { alert('Pick start and end time.'); return; }
            const [dk, idx] = id.split('#'); const i = Number(idx);
            const start = timeToDate(dk, sv), end = timeToDate(dk, ev);
            if (end <= start) { alert('End time must be after start time.'); return; }
            const data = load();
            const result = applyWithOverlap(data[dk] || [], { start, end }, i);
            if (!result) return;
            if (result.length) data[dk] = result; else delete data[dk];
            save(data); editing = null; render();
        }

        function deleteSession(id) {
            const [dk, idx] = id.split('#'); const i = Number(idx);
            const data = load(); const arr = data[dk] || [];
            arr.splice(i, 1);
            if (arr.length) data[dk] = arr; else delete data[dk];
            save(data); editing = null; render();
        }

        function deleteDay(key) {
            const data = load();
            delete data[key];
            openNodes.delete('d:' + key);
            save(data);
            render();
        }

        function toggleNode(id) {
            if (openNodes.has(id)) openNodes.delete(id); else openNodes.add(id);
            renderHistory();
        }

        // shared renderer for a day's session list (today + expanded history)
        function sessionsHTML(dateKey, arr) {
            const now = Date.now();
            return arr.map((s, i) => {
                const id = `${dateKey}#${i}`;
                if (editing === id) {
                    return `<li><div class="edit-row">` +
                        `<input type="time" class="e-start" value="${toTimeVal(s.start)}">` +
                        `<span class="sep">→</span>` +
                        `<input type="time" class="e-end" value="${toTimeVal(s.end ?? now)}">` +
                        `<button class="icon-btn ok" data-save="${id}" title="Save">✓</button>` +
                        `<button class="icon-btn cancel" data-cancel="1" title="Cancel">✕</button>` +
                        `</div></li>`;
                }
                const running = s.end == null;
                const endTxt = running ? '<span class="live">now</span>' : fmtClock(s.end);
                const cap = s.capped ? '<span class="cap">auto-closed</span>' : '';
                const cls = running ? 'times' : 'times editable';
                const editAttr = running ? '' : ` data-edit="${id}"`;
                return `<li>` +
                    `<span class="${cls}"${editAttr}>${fmtClock(s.start)} → ${endTxt}${cap}</span>` +
                    `<span class="dur">${fmtDuration(effEnd(s, now) - s.start)}</span>` +
                    `<button class="del" data-del="${id}" title="Delete">✕</button></li>`;
            }).join('');
        }

        function renderToday() {
            const data = load();
            const sessions = data[todayKey()] || [];
            const running = isRunning(sessions);
            const now = Date.now();

            el.total.innerHTML = fmtTotalHTML(dayTotal(sessions, now));
            el.dot.classList.toggle('on', running);
            el.statusText.textContent = running ? 'Working…' : (sessions.length ? 'On a break' : 'Not working');
            el.toggle.textContent = running ? 'Clock Out' : 'Clock In';
            el.toggle.className = running ? 'btn-off' : 'btn-on';
            el.sessions.innerHTML = sessionsHTML(todayKey(), sessions);

            // live ticking only while running and not editing
            const shouldTick = running && !editing;
            if (shouldTick && !tick) tick = setInterval(renderToday, 1000);
            if (!shouldTick && tick) { clearInterval(tick); tick = null; }
        }

        function renderWeek() {
            const data = load(); const now = Date.now(); const sow = startOfWeek(new Date());
            let sum = 0;
            for (const k of Object.keys(data)) {
                if (new Date(k + 'T00:00').getTime() >= sow) sum += dayTotal(data[k], now);
            }
            el.weekstat.innerHTML = `This week · <b>${fmtDuration(sum)}</b>`;
        }

        // a single day, expandable to its (editable) sessions
        function dayNodeHTML(k, arr) {
            const id = 'd:' + k, open = openNodes.has(id);
            const total = fmtDuration(dayTotal(arr, Date.now()));
            return `<div class="hnode${open ? ' open' : ''}">` +
                `<div class="hnode-head" data-node="${id}">` +
                    `<span class="caret">▶</span>` +
                    `<span class="label">${dayLabel(k)}</span>` +
                    `<span class="hrs">${total}</span>` +
                    `<button class="del" data-delday="${k}" title="Delete day">✕</button>` +
                `</div>` +
                `<div class="hnode-body"><ul class="sessions">${sessionsHTML(k, arr)}</ul></div>` +
            `</div>`;
        }

        // a collapsible group (week or month) wrapping child nodes
        function groupNodeHTML(id, label, totalMs, childrenHTML) {
            const open = openNodes.has(id);
            return `<div class="hnode${open ? ' open' : ''}">` +
                `<div class="hnode-head group" data-node="${id}">` +
                    `<span class="caret">▶</span>` +
                    `<span class="label">${label}</span>` +
                    `<span class="hrs">${fmtDuration(totalMs)}</span>` +
                `</div>` +
                `<div class="hnode-body">${childrenHTML}</div>` +
            `</div>`;
        }

        function renderHistory() {
            const data = load(); const now = Date.now();
            const keys = Object.keys(data).filter(k => k !== todayKey());
            if (!keys.length) {
                el.history.innerHTML = '<div class="empty">No previous days yet</div>';
                return;
            }
            const sow = startOfWeek(new Date()), som = monthStart(new Date());
            const byDesc = (a, b) => dayMs(b) - dayMs(a);
            const sumDays = (dks) => dks.reduce((s, k) => s + dayTotal(data[k], now), 0);

            const thisWeek  = keys.filter(k => dayMs(k) >= sow).sort(byDesc);
            const thisMonth = keys.filter(k => dayMs(k) < sow && dayMs(k) >= som);
            const older     = keys.filter(k => dayMs(k) < som);

            let html = '';

            // 1) current week → one line per day
            html += thisWeek.map(k => dayNodeHTML(k, data[k])).join('');

            // 2) earlier this month → one line per week (expands to days)
            const weeks = groupBy(thisMonth, k => keyOf(new Date(startOfWeek(dayMs(k)))));
            Object.keys(weeks).sort().reverse().forEach(ws => {
                const dks = weeks[ws].sort(byDesc);
                const children = dks.map(k => dayNodeHTML(k, data[k])).join('');
                html += groupNodeHTML('w:' + ws, weekLabel(dayMs(ws)), sumDays(dks), children);
            });

            // 3) older → one line per month (expands to weeks → days)
            const months = groupBy(older, k => k.slice(0, 7));
            Object.keys(months).sort().reverse().forEach(ym => {
                const dks = months[ym];
                const mweeks = groupBy(dks, k => keyOf(new Date(startOfWeek(dayMs(k)))));
                let children = '';
                Object.keys(mweeks).sort().reverse().forEach(ws => {
                    const wdks = mweeks[ws].sort(byDesc);
                    children += groupNodeHTML('m' + ym + 'w:' + ws, weekLabel(dayMs(ws)),
                        sumDays(wdks), wdks.map(k => dayNodeHTML(k, data[k])).join(''));
                });
                html += groupNodeHTML('m:' + ym, monthLabel(dayMs(dks[0])), sumDays(dks), children);
            });

            el.history.innerHTML = html;
        }

        function render() { autoCloseStale(); renderToday(); renderWeek(); renderHistory(); }

        // shared click handler for both today + history session lists
        function onListClick(e) {
            let n;
            if (n = e.target.closest('[data-save]'))   return commitEdit(n);
            if (e.target.closest('[data-cancel]'))     { editing = null; render(); return; }
            if (n = e.target.closest('[data-del]'))    return deleteSession(n.dataset.del);
            if (n = e.target.closest('[data-delday]')) { const k = n.dataset.delday; if (confirm(`Delete all sessions for ${k}?`)) deleteDay(k); return; }
            if (n = e.target.closest('[data-edit]'))   return beginEdit(n.dataset.edit);
            if (n = e.target.closest('[data-node]'))   return toggleNode(n.dataset.node);
        }

        // ===== dev helper: fake past data. In console: seed() or seed(14) =====
        window.seed = function (days = 10) {
            const data = load();
            for (let n = 1; n <= days; n++) {
                const d = new Date(); d.setDate(d.getDate() - n); d.setHours(0,0,0,0);
                if ((d.getDay()+6)%7 >= 5) continue;            // skip weekends
                const k = keyOf(d);
                const inH = 8 + Math.floor(Math.random()*2);    // start 8–9
                const lunch = 12;
                const sessions = [
                    { start: timeToDate(k, `${pad(inH)}:00`), end: timeToDate(k, `${lunch}:00`) },
                    { start: timeToDate(k, `${lunch}:${30+Math.floor(Math.random()*15)}`), end: timeToDate(k, `${16+Math.floor(Math.random()*2)}:${pad(Math.floor(Math.random()*59))}`) },
                ];
                data[k] = sessions;
            }
            save(data); render();
            console.log(`Seeded ${days} day(s) of fake data. Run clearAll() to wipe everything.`);
        };
        window.clearAll = function () { localStorage.removeItem(STORE_KEY); openNodes.clear(); render(); console.log('Cleared all tracker data.'); };

        function exportCSV() {
            const data = load();
            const rows = [['date', 'hours']];
            Object.keys(data).sort().forEach(k => {
                rows.push([k, (dayTotal(data[k], Date.now()) / 3600000).toFixed(2)]);
            });
            const csv = rows.map(r => r.join(',')).join('\n');
            const url = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            const a = document.createElement('a');
            a.href = url; a.download = 'time-tracker.csv'; a.click();
            URL.revokeObjectURL(url);
        }

        // ===== Init =====
        el.date.textContent = new Date().toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        el.addDate.value = todayKey();
        el.toggle.addEventListener('click', toggle);
        el.export.addEventListener('click', exportCSV);
        el.addBtn.addEventListener('click', addManual);
        el.sessions.addEventListener('click', onListClick);
        el.history.addEventListener('click', onListClick);
        // re-render when tab regains focus (handles midnight rollover / other tabs)
        document.addEventListener('visibilitychange', () => { if (!document.hidden) render(); });
        // PWA: register service worker for installability + offline
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
        }
        render();
    </script>
</body>
</html>
